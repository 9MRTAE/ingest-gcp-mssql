name: ingest_gcp_mssql_popcorn

prefect-version: "3"

# CHANGE POINT: removed build/push steps (prefect_docker build_docker_image).
# Image is built and pushed by CI/CD pipeline (Jenkinsfile) — not by prefect deploy.
# This matches the auth template pattern: deploy only registers, never builds.
build: []
push: []

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# ── Deployments ───────────────────────────────────────────────────────────────
# Convention:
#   name      = ingest_{platform}_{db_type}_{db_name}_{application}
#   1 deployment = 1 GCS_APPLICATION (= 1 BU slice of the ECOM DB)
#
# To add a new BU / application:
#   1. Create flows/ingest_gcp_mssql_{db_name}_{application}.py
#   2. Add a deployment block below
#   3. Add the flow import to deploy.py and run_local.py
#
# Repair single table via CLI:
#   prefect deployment run \
#     'ingest_gcp_mssql_ECOM_livingmart/ingest_gcp_mssql_ECOM_livingmart' \
#     -p TABLE_NAME=tmAttribute -p JOB_BACKDATE_DEPEN=-3

deployments:

  # ── ECOM · livingmart ───────────────────────────────────────────────────────
  - name: ingest_gcp_mssql_ecom
    entrypoint: flows/ingest_gcp_mssql_ecom.py:ingest_gcp_mssql_ecom
    work_pool:
      name: "{{ $PREFECT_WORK_POOL }}"
      work_queue_name: "{{ $PREFECT_WORK_QUEUE }}"
      job_variables:
        image: "{{ $IMAGE_TAG }}"
        env:
          CI_COMMIT_BRANCH: "{{ $CI_COMMIT_BRANCH }}"
          IMAGE_TAG: "{{ $IMAGE_TAG }}"
          SECRET_PROJECT_ID: "{{ $SECRET_PROJECT_ID }}"
          SECRET_DB_HOST: "{{ $SECRET_DB_HOST }}"
          SECRET_DB_PASSWORD: "{{ $SECRET_DB_PASSWORD }}"
          SECRET_SERVICE_ACCOUNT: "{{ $SECRET_SERVICE_ACCOUNT }}"
    parameters:
      TABLE_NAME: ""
      JOB_BACKDATE_DEPEN: "-1"
      JOB_STARTDATE_DEPEN: ""
      JOB_ENDDATE_DEPEN: ""
    schedules:
      - cron: "40 18 * * *"
        timezone: "Asia/Bangkok"
        active: true

  # ── ERP · smartaudit ───────────────────────────────────────────────────────
  - name: ingest_gcp_mssql_erp_smartaudit
